<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DuckDB Pyodide Smoke Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h1 { color: #569cd6; }
    #output { white-space: pre; background: #252526; padding: 16px; border-radius: 4px; min-height: 200px; }
    .ok   { color: #4ec9b0; }
    .err  { color: #f48771; }
    .info { color: #9cdcfe; }
    .fail { color: #f48771; font-weight: bold; }
    .pass { color: #4ec9b0; }
  </style>
</head>
<body>
  <h1>DuckDB / Pyodide 0.29.3 smoke test</h1>
  <div id="output">Loading Pyodide…</div>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
  <script>
    const out = document.getElementById('output');
    function log(msg, cls) {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = msg + '\n';
      out.appendChild(span);
    }

    const TESTS = [
      {
        name: 'test_duckdb',
        code: `
import duckdb

with duckdb.connect() as con:
    (platform,) = con.execute("PRAGMA platform").fetchone()
    con.execute("CREATE TEMP TABLE t (id INT, content STRING)")
    con.execute("INSERT INTO t VALUES (42, 'hello'), (43, 'world')")
    query_result = con.execute(
        "SELECT rowid, * FROM t ORDER BY rowid"
    ).fetchall()

assert "pyodide" in platform
assert "wasm" in platform
assert query_result == [(0, 42, "hello"), (1, 43, "world")]

"ok"
`,
      },
      {
        name: 'test_duckdb_with_pandas',
        code: `
import duckdb
import pandas as pd

with duckdb.connect() as con:
    df = con.sql("SELECT UNNEST(RANGE(5)) as x ORDER BY x").df()

expected = pd.DataFrame({"x": range(5)})
assert df.equals(expected)

"ok"
`,
      },
    ];

    async function main() {
      out.textContent = '';

      // Discover wheel filename dynamically
      log('Discovering wheel file…', 'info');
      const dirResp = await fetch('./wasm-dist/');
      let wheelFile;
      if (dirResp.ok) {
        const text = await dirResp.text();
        const match = text.match(/duckdb-[^\s"'<>]+\.whl/);
        if (match) wheelFile = match[0];
      }
      if (!wheelFile) {
        log('ERROR: Could not find .whl in /wasm-dist/', 'err');
        return;
      }

      log('Loading Pyodide 0.29.3…', 'info');
      const pyodide = await loadPyodide();
      log('Pyodide ready.', 'ok');

      log('Installing duckdb wheel via micropip…', 'info');
      await pyodide.loadPackage('micropip');
      const micropip = pyodide.pyimport('micropip');

      const wheelUrl = new URL('./wasm-dist/' + wheelFile, location.href).href;
      log('Wheel URL: ' + wheelUrl, 'info');
      await micropip.install(wheelUrl);
      log('Wheel installed.', 'ok');

      log('Installing pandas…', 'info');
      await pyodide.loadPackage('pandas');
      log('pandas installed.\n', 'ok');

      log('Running tests…', 'info');
      let passed = 0, failed = 0;
      for (const test of TESTS) {
        try {
          await pyodide.runPythonAsync(test.code);
          log('  PASS  ' + test.name, 'pass');
          passed++;
        } catch (e) {
          log('  FAIL  ' + test.name, 'fail');
          log('        ' + e, 'err');
          failed++;
        }
      }

      log('');
      const total = passed + failed;
      if (failed === 0) {
        log(`${passed}/${total} passed`, 'ok');
      } else {
        log(`${passed}/${total} passed, ${failed} failed`, 'fail');
      }
    }

    main().catch(e => {
      log('\nERROR: ' + e, 'err');
      console.error(e);
    });
  </script>
</body>
</html>
